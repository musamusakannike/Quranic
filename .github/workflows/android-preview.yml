name: Build Android Preview

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: 🚀 Build app
        working-directory: ./mobile
        run: eas build --platform android --profile preview --local --non-interactive --output app-preview.apk

      - name: ⬆️ Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-preview-apk
          path: mobile/app-preview.apk
          retention-days: 7
